<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Interactive Photo Gallery</h1>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <img src="https://picsum.photos/id/1015/200/150"
         alt="Beautiful Mountain"
         onmouseover="upDate(this)"
         onmouseout="undo()">

    <img src="https://picsum.photos/id/1025/200/150"
         alt="Cute Dog"
         onmouseover="upDate(this)"
         onmouseout="undo()">

    <img src="https://picsum.photos/id/1035/200/150"
         alt="Green Forest"
         onmouseover="upDate(this)"
         onmouseout="undo()">

    <script src="script.js"></script>

</body>
</html>
